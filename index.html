<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio | Premium Editor V42</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root{--accent:#10b981;--bg:#0f172a;--panel:#1e293b;--border:#334155;--handle-move:#3b82f6;--handle-rotate:#f59e0b;--handle-radius:#ec4899}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{margin:0;padding:0;width:100%;height:100vh;overflow:hidden;background:var(--bg);color:#fff;font-family:'Inter', 'Roboto', sans-serif;}
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000}
        .login-card{background:var(--panel);padding:40px;border-radius:20px;width:340px;text-align:center;border:1px solid var(--border);}
        .login-card input{width:100%;padding:14px;margin-bottom:15px;border-radius:10px;border:1px solid var(--border);background:#000;color:#fff;}
        .login-card button{width:100%;padding:14px;background:var(--accent);border:none;color:#fff;font-weight:700;border-radius:10px;cursor:pointer;}
        
        #app-container{display:none;height:100%;width:100%;flex-direction:row}
        #sidebar{width:480px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100%;z-index:100;}
        .sidebar-scroll-area{flex-shrink:0;max-height:60%;overflow-y:auto;background:#111827;padding:15px;border-bottom:2px solid var(--border)}
        #editor-fields{flex:1;overflow-y:auto;padding:20px;background:rgba(0,0,0,.2);padding-bottom:80px}
        
        #layers-list{flex:1;overflow-y:auto; max-height:200px;}
        .layer-item{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;background:#1e293b;}
        .layer-item.active{border-left:4px solid var(--accent);background:rgba(16,185,129,.15);font-weight:700}
        .layer-actions{display:flex;gap:4px;align-items:center}
        .layer-btn{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;padding:2px;}
        
        #main-view{flex:1;background:#020617;overflow:hidden;position:relative;height:calc(100% - 25px);display:flex}
        #zoom-container{flex:1;display:flex;align-items:center;justify-content:center;transform-origin:center center;transition:transform .2s ease-out;position:relative;}
        #svg-wrapper{position:relative;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px #000;touch-action:none;}
        #canvas-inner{width:100%;height:100%;display:flex;}
        #canvas-inner svg{width:auto;height:auto;max-width:100%;max-height:100%;overflow:visible}
        
        .floating-tools{position:fixed;bottom:45px;left:40px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;gap:8px;z-index:500;}
        .tool-btn{background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:700;display:flex; align-items:center;}
        .tool-btn.active{background:var(--accent);color:#000;}
        
        .duzenlenebilir{cursor:move;pointer-events:all}
        #control-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;overflow:visible}
        .handle{fill:#fff;stroke-width:2;pointer-events:all;}
        .handle-resize{stroke:var(--handle-move);cursor:nwse-resize}
        
        input[type="range"]{width:100%;accent-color:var(--accent);height:6px;cursor:pointer;margin:0}
        input[type="text"],input[type="number"],textarea{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:#000;color:#fff;outline:none;}
        .font-select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:#000;color:#fff;margin-bottom:5px;outline:none;cursor:pointer}
        
        .action-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
        .action-btn{flex:1;background:#334155;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;display:flex; align-items:center; justify-content:center; gap:6px;}
        .action-btn.active{background:var(--accent);}
        
        .group-box{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;border:1px solid #1e293b;margin-bottom:15px}
        .prop-group{margin-bottom:20px;}
        .prop-group-title{font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:6px; display:flex;}
        
        .tabs-header { display: flex; gap: 4px; margin-bottom: 15px; background: #0f172a; padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; background: transparent; border: none; color: #94a3b8; font-size: 11px; font-weight: 700; padding: 10px 4px; cursor: pointer; border-radius: 6px;}
        .tab-btn.active { background: var(--panel); color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;width:100%}
        .label-text{font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;}
        .value-badge{background:#000;color:var(--accent);font-size:11px;padding:3px 6px;border-radius:4px;font-family:monospace;font-weight:700}
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events:none;}
        .toast { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 14px 24px; border-radius: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); font-size: 13px; font-weight: 700;}

        .mini-screen-dummy { stroke-dasharray: 10,5; animation: dash 2s linear infinite; fill-opacity:0.3; }
        @keyframes dash { to { stroke-dashoffset: -30; } }
    </style>
</head>
<body>

<div id="toast-container"></div>
<div id="login-screen">
    <div class="login-card">
        <h2 style="color:white;"><i class="ph ph-shield-check" style="color:var(--accent);"></i> Pro Studio V42</h2>
        <input type="password" id="passInput" placeholder="Sunucu Şifresi">
        <button onclick="window.login()">Bağlan</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div class="floating-tools">
            <button class="tool-btn" onclick="window.undo()"><i class="ph ph-arrow-u-up-left"></i></button>
            <button class="tool-btn" onclick="window.redo()"><i class="ph ph-arrow-u-up-right"></i></button>
            <button class="tool-btn" onclick="window.changeZoom(-0.1)"><i class="ph ph-magnifying-glass-minus"></i></button>
            <button class="tool-btn" id="zoom-val" onclick="window.resetZoom()">100%</button>
            <button class="tool-btn" onclick="window.changeZoom(0.1)"><i class="ph ph-magnifying-glass-plus"></i></button>
        </div>
        <div id="zoom-container"><div id="svg-wrapper"><div id="canvas-inner"></div><svg id="control-layer"></svg></div></div>
        <div id="status-bar" style="position:absolute;bottom:0;width:100%;height:25px;background:#0f172a;display:flex;justify-content:space-between;padding:0 20px;font-size:11px;color:#94a3b8;"><div id="status-count">Nesne: 0</div><div>SVG Pro Ultimate</div></div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-scroll-area">
            <div style="display:flex; gap:5px; margin-bottom: 10px;">
                <button onclick="window.saveData()" class="action-btn active" style="flex:2;"><i class="ph ph-floppy-disk"></i> KAYDET</button>
            </div>
            <select id="file-selector" style="width:100%; padding:10px; background:#000; color:#fff; border-radius:8px; margin-bottom:10px; border:1px solid #334155; outline:none;">
                <option value="slayt.svg">Ana Slayt (slayt.svg)</option>
                <option value="kampanya.svg">Kampanya (kampanya.svg)</option>
            </select>

            <details style="margin-bottom: 10px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#3b82f6; cursor:pointer;"><i class="ph ph-television"></i> MİNİ EKRAN KONTROLÜ</summary>
                <div class="group-box" style="border-color:#3b82f6;">
                    <div class="label-text" style="color:#60a5fa;">SOL EKRAN (M3U8)</div>
                    <input type="text" id="m38u-url" placeholder="m3u8 Linki" onchange="window.updateMiniScreenSetting('left')" style="margin-bottom:5px;">
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <input type="number" id="m38u-x" placeholder="X" onchange="window.updateMiniScreenSetting('left')">
                        <input type="number" id="m38u-y" placeholder="Y" onchange="window.updateMiniScreenSetting('left')">
                    </div>
                    <div style="display:flex; gap:5px; margin-bottom:15px;">
                        <button id="btn-m38u-toggle" onclick="window.toggleMiniScreen('left')" class="action-btn">GÖSTER/GİZLE</button>
                        <input type="number" id="m38u-w" placeholder="W" onchange="window.updateMiniScreenSetting('left')">
                        <input type="number" id="m38u-h" placeholder="H" onchange="window.updateMiniScreenSetting('left')">
                    </div>

                    <div class="label-text" style="color:#f59e0b;">SAĞ EKRAN (RESİMLER)</div>
                    <textarea id="right-images" placeholder="r1.jpg, r2.jpg" style="height:40px; margin-bottom:5px;" onchange="window.updateMiniScreenSetting('right')"></textarea>
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <input type="number" id="right-x" placeholder="X" onchange="window.updateMiniScreenSetting('right')">
                        <input type="number" id="right-y" placeholder="Y" onchange="window.updateMiniScreenSetting('right')">
                    </div>
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <button id="btn-right-toggle" onclick="window.toggleMiniScreen('right')" class="action-btn">GÖSTER/GİZLE</button>
                        <input type="number" id="right-w" placeholder="W" onchange="window.updateMiniScreenSetting('right')">
                        <input type="number" id="right-h" placeholder="H" onchange="window.updateMiniScreenSetting('right')">
                    </div>
                </div>
            </details>
            
            <details style="margin-bottom: 10px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#ec4899; cursor:pointer;"><i class="ph ph-article"></i> TICKER VE SAAT</summary>
                <div class="group-box" style="border-color:#ec4899;">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <button id="btn-ticker-toggle" onclick="window.toggleTicker()" class="action-btn">GÖSTER/GİZLE</button>
                        <button id="btn-clock-toggle" onclick="window.toggleClock()" class="action-btn" style="background:#8b5cf6;">SAAT AÇIK</button>
                    </div>
                    <div class="label-text" style="color:#ec4899;">KAYAN YAZI METNİ</div>
                    <input type="text" id="ticker-text" placeholder="Mesajınız..." oninput="window.updateTickerSetting()" style="margin-bottom:5px;">
                    <div style="display:flex; gap:5px; margin-bottom:5px;">
                        <input type="number" id="ticker-x" placeholder="X" onchange="window.updateTickerSetting()">
                        <input type="number" id="ticker-y" placeholder="Y" onchange="window.updateTickerSetting()">
                    </div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="ticker-w" placeholder="W" onchange="window.updateTickerSetting()">
                        <input type="number" id="ticker-h" placeholder="H" onchange="window.updateTickerSetting()">
                    </div>
                </div>
            </details>
            
            <details style="margin-bottom: 10px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#8b5cf6; cursor:pointer;"><i class="ph ph-paint-brush"></i> NESNE EKLE</summary>
                <div class="group-box">
                    <div class="action-row" style="margin:0;">
                        <button onclick="window.addNewText()" class="action-btn" style="background:#475569;"><i class="ph ph-text-t"></i> YAZI</button>
                        <button onclick="window.addShape('rect')" class="action-btn" style="background:#475569;"><i class="ph ph-square"></i> KARE</button>
                    </div>
                </div>
            </details>

            <details style="margin-bottom: 5px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#06b6d4; cursor:pointer;"><i class="ph ph-layers"></i> KATMANLAR</summary>
                <div class="group-box" style="padding:0; overflow:hidden;"><div id="layers-list"></div></div>
            </details>
        </div>
        <div id="editor-fields"><div style="text-align:center; color:#64748b; margin-top:50px;">Nesne seçin.</div></div>
    </div>
</div>

<script>
    const WORKER_URL = "https://sw.tafbilgiislem.workers.dev"; 
    let SHA_KEY = "", SESSION_PASS = "", settingsData = {}, settingsSha = "", currentActiveTab = 'tab-layout';
    let selectedEl = null, resizingEl = null, rotatingEl = null, activeHandle = null, offset = {x:0, y:0}, startP = {x:0, y:0}, startData = {}, isModified = false;
    let currentZoom = 1, panX = 0, panY = 0, historyStack = [], historyIndex = -1, isDraggingElement = false;
    
    const googleFonts = [{ name: "Varsayılan", val: "sans-serif" }, { name: "Roboto", val: "'Roboto', sans-serif" }, { name: "Montserrat", val: "'Montserrat', sans-serif" }, { name: "Poppins", val: "'Poppins', sans-serif" }, { name: "Oswald", val: "'Oswald', sans-serif" }, { name: "Bebas Neue", val: "'Bebas Neue', sans-serif" }];
    let recentColors = ['#10b981', '#3b82f6', '#ef4444', '#f59e0b', '#8b5cf6', '#ffffff'];

    window.universalUpdate = function(id, key, val) {
        const isTicker = id === 'ticker_dummy'; const el = document.getElementById(id);
        if (isTicker) {
            if (key === 'text') { settingsData.ticker.text = val; if(document.getElementById('ticker-text')) document.getElementById('ticker-text').value = val; } 
            else if (['x','y','w','h','fontSize','speed','opacity','shadowBlur'].includes(key)) { settingsData.ticker[key] = parseFloat(val) || 0; } 
            else { settingsData.ticker[key] = val; }
            if (key === 'w') el.setAttribute('width', val); if (key === 'h') el.setAttribute('height', val);
            if (key === 'x') el.setAttribute('x', val); if (key === 'y') el.setAttribute('y', val);
            if (key === 'bgColor') el.setAttribute('fill', val); if (key === 'opacity') el.setAttribute('fill-opacity', val);
            window.saveAllSettingsToCloud(true); 
        } else {
            if (['x','y','w','h'].includes(key)) window.changeProp(id, key, val); else window.changeSetting(id, key, val);
        }
        const badge = document.getElementById(`val-${key}-${id}`);
        if (badge) badge.innerText = val + (['opacity','speed'].includes(key) ? '' : 'px');
    };

    window.showToast = function(msg) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = 'toast'; t.innerHTML = `<i class="ph ph-check-circle"></i> <span>${msg}</span>`;
        c.appendChild(t); setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    };

    window.setD = function(el, key, val) { if(el) el.setAttribute('data-' + key, val); };
    window.getD = function(el, key) { return el ? el.getAttribute('data-' + key) : null; };

    window.login = async function() {
        SESSION_PASS = document.getElementById('passInput').value; 
        await window.loadSettings(); await window.loadSlide();    
    };
    
    window.loadSettings = async function() {
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json"} });
            if (res.ok) {
                const data = await res.json(); settingsSha = data.sha;
                settingsData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                if(!settingsData.mini_screens) settingsData.mini_screens = { left:{visible:true,x:50,y:800,w:400,h:250}, right:{visible:true,x:1470,y:800,w:400,h:250,images:[]} };
                if (!settingsData.ticker) settingsData.ticker = { visible: false, showClock: true, text: "Hoş geldiniz...", speed: 20, x: 0, y: 980, w: 1920, h: 100, color: "#ffffff", bgColor: "#000000", opacity: 0.8, font: "sans-serif", fontSize: 40 };
                window.updateSettingsUI();
            }
        } catch (e) {}
    };

    window.updateSettingsUI = function() {
        const ms = settingsData.mini_screens;
        if(ms.left) { document.getElementById('m38u-url').value = ms.left.url || ""; document.getElementById('m38u-x').value = ms.left.x; document.getElementById('m38u-y').value = ms.left.y; document.getElementById('m38u-w').value = ms.left.w; document.getElementById('m38u-h').value = ms.left.h; document.getElementById('btn-m38u-toggle').style.background = ms.left.visible ? "#10b981" : "#991b1b"; }
        if(ms.right) { document.getElementById('right-images').value = (ms.right.images||[]).join(","); document.getElementById('right-x').value = ms.right.x; document.getElementById('right-y').value = ms.right.y; document.getElementById('right-w').value = ms.right.w; document.getElementById('right-h').value = ms.right.h; document.getElementById('btn-right-toggle').style.background = ms.right.visible ? "#10b981" : "#991b1b"; }
        
        const t = settingsData.ticker;
        document.getElementById('ticker-text').value = t.text; document.getElementById('ticker-x').value = t.x; document.getElementById('ticker-y').value = t.y; document.getElementById('ticker-w').value = t.w; document.getElementById('ticker-h').value = t.h;
        document.getElementById('btn-ticker-toggle').style.background = t.visible ? "#10b981" : "#991b1b"; document.getElementById('btn-clock-toggle').style.background = t.showClock ? "#10b981" : "#991b1b";
        
        window.syncDummyElement('left'); window.syncDummyElement('right'); window.syncDummyElement('ticker');
    };

    window.syncDummyElement = function(type) {
        const id = type === 'left' ? 'mini_left' : (type === 'right' ? 'mini_right' : 'ticker_dummy');
        const ms = type === 'ticker' ? settingsData.ticker : settingsData.mini_screens[type];
        let el = document.getElementById(id); const svg = document.querySelector('#canvas-inner svg');
        if(ms.visible && svg) {
            if(!el) { el = document.createElementNS("http://www.w3.org/2000/svg", "rect"); el.id = id; el.setAttribute("class", "duzenlenebilir mini-screen-dummy"); el.setAttribute("stroke-width", "6"); svg.appendChild(el); }
            if(type === 'ticker') { el.setAttribute("fill", ms.bgColor || "#000"); el.setAttribute("fill-opacity", ms.opacity); el.setAttribute("stroke", "#ec4899"); } 
            else { el.setAttribute("fill", type === 'left' ? "rgba(59, 130, 246, 0.4)" : "rgba(245, 158, 11, 0.4)"); el.setAttribute("stroke", type === 'left' ? "#3b82f6" : "#f59e0b"); }
            el.setAttribute("x", ms.x || 0); el.setAttribute("y", ms.y || 0); el.setAttribute("width", ms.w || 100); el.setAttribute("height", ms.h || 100);
        } else if(el) { el.remove(); if(selectedEl?.id === id) { selectedEl = null; document.getElementById('control-layer').innerHTML=""; window.renderProperties(); } }
    };

    window.toggleMiniScreen = function(side) { settingsData.mini_screens[side].visible = !settingsData.mini_screens[side].visible; window.updateSettingsUI(); window.saveAllSettingsToCloud(true); };
    window.updateMiniScreenSetting = function(side) {
        if(side === 'left') { settingsData.mini_screens.left.url = document.getElementById('m38u-url').value; settingsData.mini_screens.left.x = parseFloat(document.getElementById('m38u-x').value)||0; settingsData.mini_screens.left.y = parseFloat(document.getElementById('m38u-y').value)||0; settingsData.mini_screens.left.w = parseFloat(document.getElementById('m38u-w').value)||0; settingsData.mini_screens.left.h = parseFloat(document.getElementById('m38u-h').value)||0; } 
        else { settingsData.mini_screens.right.images = document.getElementById('right-images').value.split(','); settingsData.mini_screens.right.x = parseFloat(document.getElementById('right-x').value)||0; settingsData.mini_screens.right.y = parseFloat(document.getElementById('right-y').value)||0; settingsData.mini_screens.right.w = parseFloat(document.getElementById('right-w').value)||0; settingsData.mini_screens.right.h = parseFloat(document.getElementById('right-h').value)||0; }
        window.syncDummyElement(side); window.saveAllSettingsToCloud(true);
    };

    window.toggleTicker = function() { settingsData.ticker.visible = !settingsData.ticker.visible; window.updateSettingsUI(); window.saveAllSettingsToCloud(true); };
    window.toggleClock = function() { settingsData.ticker.showClock = !settingsData.ticker.showClock; window.updateSettingsUI(); window.saveAllSettingsToCloud(true); };
    window.updateTickerSetting = function() { settingsData.ticker.text = document.getElementById('ticker-text').value; settingsData.ticker.x = parseFloat(document.getElementById('ticker-x').value)||0; settingsData.ticker.y = parseFloat(document.getElementById('ticker-y').value)||0; settingsData.ticker.w = parseFloat(document.getElementById('ticker-w').value)||0; settingsData.ticker.h = parseFloat(document.getElementById('ticker-h').value)||0; window.syncDummyElement('ticker'); window.saveAllSettingsToCloud(true); };

    window.saveAllSettingsToCloud = async function(silent = false) {
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(settingsData, null, 2))));
        const res = await fetch(WORKER_URL, { method: "PUT", headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json" }, body: JSON.stringify({content: b64, sha: settingsSha}) });
        if(res.ok) { const d = await res.json(); settingsSha = d.content?.sha || d.sha; if(!silent) window.showToast("Kaydedildi!"); }
    };
    window.loadSlide = async function() {
        const file = document.getElementById('file-selector').value;
        const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
        if (res.ok) {
            const data = await res.json(); SHA_KEY = data.sha || "";
            document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
            document.getElementById('login-screen').style.display = "none"; document.getElementById('app-container').style.display = "flex";
            window.setupLayers(); window.saveState(); window.updateSettingsUI();
        }
    };

    window.saveData = async function() {
        document.getElementById('control-layer').innerHTML = ""; 
        const svg = document.querySelector('#canvas-inner svg').cloneNode(true);
        // KAYIT ÖNCESİ DUMMY TEMİZLİĞİ (TICKER EKRANDA KALMAZ)
        ['ticker_dummy', 'mini_left', 'mini_right'].forEach(id => { const d = svg.querySelector('#'+id); if(d) d.remove(); });
        
        const b64 = btoa(unescape(encodeURIComponent(new XMLSerializer().serializeToString(svg))));
        const res = await fetch(WORKER_URL, { method: "PUT", headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value }, body: JSON.stringify({content: b64, sha: SHA_KEY}) });
        if(res.ok) { const d = await res.json(); SHA_KEY = d.content?.sha || d.sha; window.showToast("Tuval Kaydedildi!"); window.updateEditorUI(selectedEl); }
    };

    window.setupLayers = function() {
        const mainSvg = document.querySelector('#canvas-inner svg'); const ctrl = document.getElementById('control-layer');
        if (!mainSvg) return;
        mainSvg.querySelectorAll('.duzenlenebilir:not(.mini-screen-dummy)').forEach(el => {
            if(!el.id) el.id = "el_" + Math.random().toString(36).substr(2,9);
            if(window.getD(el, 'angle') || window.getD(el, 'flip-x')) window.applyTransforms(el);
            if(window.getD(el, 'shadow-blur') || window.getD(el, 'blend')) window.applyFilters(el);
            if(window.getD(el, 'fill-type')) window.applyFill(el);
        });
        window.initEngine(mainSvg); window.renderEditor();
    };

    window.initEngine = function(svg) {
        const wrapper = document.getElementById('svg-wrapper'); const ctrl = document.getElementById('control-layer');
        const getCoords = (e) => { const pt = svg.createSVGPoint(); pt.x = e.clientX; pt.y = e.clientY; return pt.matrixTransform(svg.getScreenCTM().inverse()); };

        wrapper.onpointerdown = (e) => {
            const p = getCoords(e); const target = e.target; isModified = false;
            if (target.classList.contains('handle')) {
                const el = document.getElementById(target.dataset.id); if (!el || window.getD(el, 'locked') === "true") return;
                startP = p; startData = { x: parseFloat(el.getAttribute("x"))||0, y: parseFloat(el.getAttribute("y"))||0, w: parseFloat(el.getAttribute("width"))||0, h: parseFloat(el.getAttribute("height"))||0 };
                if (target.classList.contains('handle-resize')) { resizingEl = el; activeHandle = 'resize'; }
                try { wrapper.setPointerCapture(e.pointerId); } catch(err){} return;
            }
            const el = target.closest('.duzenlenebilir');
            if (el) {
                selectedEl = el; isDraggingElement = true; offset.x = p.x - (parseFloat(el.getAttribute("x")) || 0); offset.y = p.y - (parseFloat(el.getAttribute("y")) || 0); 
                window.updateUI(selectedEl); window.renderProperties();
                try { wrapper.setPointerCapture(e.pointerId); } catch(err){}
            } else { selectedEl = null; ctrl.innerHTML = ""; window.renderProperties(); }
        };

        wrapper.onpointermove = (e) => {
            if (!selectedEl || (!isDraggingElement && !resizingEl)) return;
            const p = getCoords(e); const dx = p.x - startP.x; const dy = p.y - startP.y; isModified = true;
            
            if (resizingEl) {
                let { x, y, w, h } = startData;
                resizingEl.setAttribute("width", Math.max(10, w + dx)); resizingEl.setAttribute("height", Math.max(10, h + dy));
                window.updateUI(resizingEl);
            } 
            else if (isDraggingElement) {
                selectedEl.setAttribute("x", p.x - offset.x); selectedEl.setAttribute("y", p.y - offset.y);
                window.updateUI(selectedEl);
            }
        };

        wrapper.onpointerup = (e) => { 
            try { wrapper.releasePointerCapture(e.pointerId); } catch(err){} 
            isDraggingElement = false; 

            // MİNİ EKRAN VE TICKER SÜRÜKLE BIRAK KAYIT MOTORU
            if (isModified && selectedEl && selectedEl.classList.contains('mini-screen-dummy')) {
                const side = selectedEl.id === 'mini_left' ? 'left' : (selectedEl.id === 'mini_right' ? 'right' : 'ticker');
                const nx = Math.round(parseFloat(selectedEl.getAttribute('x'))) || 0;
                const ny = Math.round(parseFloat(selectedEl.getAttribute('y'))) || 0;
                const nw = Math.round(parseFloat(selectedEl.getAttribute('width'))) || 100;
                const nh = Math.round(parseFloat(selectedEl.getAttribute('height'))) || 100;

                if (side === 'ticker') {
                    settingsData.ticker.x = nx; settingsData.ticker.y = ny; settingsData.ticker.w = nw; settingsData.ticker.h = nh;
                    if(document.getElementById('ticker-x')) { document.getElementById('ticker-x').value = nx; document.getElementById('ticker-y').value = ny; document.getElementById('ticker-w').value = nw; document.getElementById('ticker-h').value = nh; }
                } else {
                    settingsData.mini_screens[side].x = nx; settingsData.mini_screens[side].y = ny; settingsData.mini_screens[side].w = nw; settingsData.mini_screens[side].h = nh;
                    const pre = side === 'left' ? 'm38u' : 'right';
                    if(document.getElementById(pre+'-x')) { document.getElementById(pre+'-x').value = nx; document.getElementById(pre+'-y').value = ny; document.getElementById(pre+'-w').value = nw; document.getElementById(pre+'-h').value = nh; }
                }
                window.saveAllSettingsToCloud(true);
            }

            if (isModified) { window.saveState(); if(selectedEl) window.renderProperties(); }
            resizingEl = null; isModified = false; 
        };
    };

    window.updateUI = function(el) {
        const ctrl = document.getElementById('control-layer'); ctrl.innerHTML = ""; if(!el) return;
        let b = el.getBBox(); const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("transform", el.getAttribute("transform") || ""); ctrl.appendChild(g);
        const r = document.createElementNS("http://www.w3.org/2000/svg", "rect"); r.setAttribute("x", b.x); r.setAttribute("y", b.y); r.setAttribute("width", b.width); r.setAttribute("height", b.height); r.setAttribute("fill", "none"); r.setAttribute("stroke", "var(--handle-move)"); r.setAttribute("stroke-width", "2"); g.appendChild(r);
        const h = document.createElementNS("http://www.w3.org/2000/svg", "rect"); h.setAttribute("x", b.x + b.width - 10); h.setAttribute("y", b.y + b.height - 10); h.setAttribute("width", 20); h.setAttribute("height", 20); h.setAttribute("class", "handle handle-resize"); h.dataset.id = el.id; g.appendChild(h);
    };
    window.updateEditorUI = window.updateUI; 

    window.renderEditor = function() { window.renderLayers(); if(selectedEl) window.renderProperties(); else document.getElementById('editor-fields').innerHTML = `<div style="text-align:center; color:#64748b; margin-top:50px;">Nesne seçin.</div>`; };
    window.renderLayers = function() { const list = document.getElementById('layers-list'); list.innerHTML = ""; Array.from(document.querySelectorAll('.duzenlenebilir:not(.mini-screen-dummy)')).reverse().forEach(el => { const i = document.createElement('div'); i.className = `layer-item ${selectedEl === el ? 'active' : ''}`; i.innerText = el.tagName.toUpperCase(); i.onclick = () => { selectedEl = el; window.updateUI(el); window.renderProperties(); }; list.appendChild(i); }); };

    window.switchTab = function(btn, tabId) {
        const wrapper = btn.closest('#editor-fields');
        wrapper.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); wrapper.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active'); wrapper.querySelector('#' + tabId).classList.add('active'); currentActiveTab = tabId;
    };

    // KUSURSUZ ÖZELLİK PANELİ (ESKİ METİN AYARLARI + YENİ TICKER)
    window.renderProperties = function() {
        const f = document.getElementById('editor-fields');
        if (!selectedEl) return;
        const el = selectedEl; const id = el.id; const isTicker = id === 'ticker_dummy';
        const getV = (key, attr, def) => isTicker ? (settingsData.ticker[key] !== undefined ? settingsData.ticker[key] : def) : (el.getAttribute(attr) || def);
        const isText = el.tagName.toLowerCase() === 'text' || isTicker;

        let tabsNav = `<div class="tabs-header"><button class="tab-btn ${currentActiveTab === 'tab-layout' ? 'active' : ''}" onclick="window.switchTab(this, 'tab-layout')">Düzen</button><button class="tab-btn ${currentActiveTab === 'tab-style' ? 'active' : ''}" onclick="window.switchTab(this, 'tab-style')">Stil</button>${isText ? `<button class="tab-btn ${currentActiveTab === 'tab-text' ? 'active' : ''}" onclick="window.switchTab(this, 'tab-text')">Metin</button>` : ''}</div>`;

        let layoutHtml = `<div class="prop-group"><div class="prop-group-title">KONUM & BOYUT</div>
            <div class="label-row"><span class="label-text">X KONUMU</span><span class="value-badge" id="val-x-${id}">${Math.round(getV('x','x',0))}px</span></div>
            <input type="range" min="-500" max="2500" value="${getV('x','x',0)}" oninput="window.universalUpdate('${id}', 'x', this.value)">
            <div class="label-row" style="margin-top:10px;"><span class="label-text">Y KONUMU</span><span class="value-badge" id="val-y-${id}">${Math.round(getV('y','y',0))}px</span></div>
            <input type="range" min="-500" max="1500" value="${getV('y','y',0)}" oninput="window.universalUpdate('${id}', 'y', this.value)">
            <div class="label-row" style="margin-top:10px;"><span class="label-text">GENİŞLİK (W)</span><span class="value-badge" id="val-w-${id}">${Math.round(getV('w','width',100))}px</span></div>
            <input type="range" min="10" max="1920" value="${getV('w','width',100)}" oninput="window.universalUpdate('${id}', 'w', this.value)">
            <div class="label-row" style="margin-top:10px;"><span class="label-text">YÜKSEKLİK (H)</span><span class="value-badge" id="val-h-${id}">${Math.round(getV('h','height',100))}px</span></div>
            <input type="range" min="10" max="500" value="${getV('h','height',100)}" oninput="window.universalUpdate('${id}', 'h', this.value)">
        </div>`;

        let styleHtml = `<div class="prop-group"><div class="prop-group-title">GÖRÜNÜM & EFEKT</div>
            <div class="label-text">ARKA PLAN / DOLGU RENGİ</div>
            <input type="color" value="${getV('bgColor','fill','#000000')}" oninput="window.universalUpdate('${id}', 'bgColor', this.value)">
            <div class="label-row" style="margin-top:10px;"><span class="label-text">SAYDAMLIK (OPAKLIK)</span><span class="value-badge" id="val-opacity-${id}">${getV('opacity','fill-opacity',1)}</span></div>
            <input type="range" min="0" max="1" step="0.1" value="${getV('opacity','fill-opacity',1)}" oninput="window.universalUpdate('${id}', 'opacity', this.value)">
        </div>`;

        let textHtml = "";
        if (isText) {
            textHtml = `<div class="prop-group"><div class="prop-group-title">METİN VE FONT</div>
                <input type="text" value="${getV('text','raw-text','')}" oninput="window.universalUpdate('${id}', 'text', this.value)" style="margin-bottom:10px;" placeholder="Mesajınızı yazın...">
                <div class="label-text">YAZI TİPİ</div>
                <select class="font-select" onchange="window.universalUpdate('${id}', 'font', this.value)">
                    ${googleFonts.map(f => `<option value="${f.val}" ${getV('font','', '').includes(f.name) ? 'selected' : ''}>${f.name}</option>`).join('')}
                </select>
                <div class="label-row" style="margin-top:10px;"><span class="label-text">YAZI BOYUTU</span><span class="value-badge" id="val-fontSize-${id}">${getV('fontSize','font-size',40)}px</span></div>
                <input type="range" min="10" max="200" value="${getV('fontSize','font-size',40)}" oninput="window.universalUpdate('${id}', 'fontSize', this.value)">
                <div class="label-text" style="margin-top:10px;">YAZI RENGİ</div>
                <input type="color" value="${getV('color','fill','#ffffff')}" oninput="window.universalUpdate('${id}', 'color', this.value)">
                ${isTicker ? `<div class="label-row" style="margin-top:10px;"><span class="label-text">KAYMA HIZI (DÜŞÜK=HIZLI)</span><span class="value-badge" id="val-speed-${id}">${getV('speed', '', 20)}</span></div><input type="number" value="${getV('speed', '', 20)}" oninput="window.universalUpdate('${id}', 'speed', this.value)">` : ''}
            </div>`;
        }

        f.innerHTML = tabsNav + `<div id="tab-layout" class="tab-content ${currentActiveTab==='tab-layout'?'active':''}">${layoutHtml}</div><div id="tab-style" class="tab-content ${currentActiveTab==='tab-style'?'active':''}">${styleHtml}</div><div id="tab-text" class="tab-content ${currentActiveTab==='tab-text'?'active':''}">${textHtml}</div>`;
    };

    window.changeProp = function(id, key, val) { const el = document.getElementById(id); if(key==='w') el.setAttribute('width', val); if(key==='h') el.setAttribute('height', val); if(key==='x') el.setAttribute('x', val); if(key==='y') el.setAttribute('y', val); window.updateUI(el); window.saveState(); };
    window.changeSetting = function(id, key, val) { const el = document.getElementById(id); if(key==='raw-text') el.textContent = val; if(key==='font') el.style.fontFamily = val; window.saveState(); };
    window.saveState = function() { const svg = document.querySelector('#canvas-inner svg'); if (!svg) return; historyStack.push(svg.innerHTML); historyIndex++; };
    window.undo = function() { if (historyIndex > 0) { historyIndex--; document.querySelector('#canvas-inner svg').innerHTML = historyStack[historyIndex]; window.initEngine(document.querySelector('#canvas-inner svg')); } };
    window.changeZoom = function(v) { currentZoom += v; document.getElementById('svg-wrapper').style.transform = `scale(${currentZoom})`; document.getElementById('zoom-val').innerText = Math.round(currentZoom*100) + "%"; };
    window.resetZoom = function() { currentZoom = 1; window.changeZoom(0); };
</script>
</body>
</html>
