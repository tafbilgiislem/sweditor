<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio | Premium CMS V42</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root{--accent:#10b981;--bg:#0f172a;--panel:#1e293b;--border:#334155;--handle-move:#3b82f6;--handle-rotate:#f59e0b;--handle-radius:#ec4899}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{margin:0;padding:0;width:100%;height:100vh;overflow:hidden;background:var(--bg);color:#fff;font-family:'Inter', sans-serif;}
        
        /* Kaydırma Çubukları */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000}
        .login-card{background:var(--panel);padding:40px;border-radius:20px;width:340px;text-align:center;border:1px solid var(--border);}
        
        #app-container{display:none;height:100%;width:100%;flex-direction:row}
        #sidebar{width:480px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100%;z-index:100;}
        
        .sidebar-scroll-area{flex-shrink:0;max-height:70%;overflow-y:auto;background:#111827;padding:15px;border-bottom:2px solid var(--border)}
        #editor-fields{flex:1;min-height:0;overflow-y:auto;padding:20px;background:rgba(0,0,0,.2);padding-bottom:80px}
        
        #main-view{flex:1;background:#020617;overflow:hidden;position:relative;display:flex}
        #zoom-container{flex:1;display:flex;align-items:center;justify-content:center;transform-origin:center center;transition:transform .2s ease-out;}
        #svg-wrapper{position:relative;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px #000;touch-action:none;}
        
        .floating-tools{position:fixed;bottom:45px;left:40px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;gap:8px;z-index:500;}
        .tool-btn{background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:6px;}
        .tool-btn:hover{background:var(--accent);}

        .action-btn{flex:1;background:#334155;color:#fff;border:none;border-radius:8px;padding:10px 15px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
        .action-btn.active{background:var(--accent);}
        .action-btn.special{background:#0284c7}
        
        .group-box{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;border:1px solid #1e293b;margin-bottom:15px}
        .label-text{font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-bottom:5px;display:block;}
        
        /* Form Elemanları */
        input[type="text"], input[type="number"], textarea, select { width:100%; padding:10px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff; outline:none; font-size:13px; margin-bottom:10px; }

        /* Katmanlar */
        .layer-item{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;background:#1e293b;}
        .layer-item.active{border-left:4px solid var(--accent);background:rgba(16,185,129,.15);}

        /* Toast */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--panel); border: 1px solid var(--border); color: #fff; padding: 14px 24px; border-radius: 12px; animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }

        /* Sekme Sistemi */
        .tabs-header { display: flex; gap: 4px; margin-bottom: 15px; background: #0f172a; padding: 4px; border-radius: 8px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: #94a3b8; font-size: 11px; font-weight: 700; padding: 10px 4px; cursor: pointer; border-radius: 6px; }
        .tab-btn.active { background: var(--panel); color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #control-layer circle, #control-layer rect { pointer-events: all; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:white;"><i class="ph ph-shield-check" style="color:var(--accent); font-size:32px;"></i> Pro Studio V42</h2>
        <input type="password" id="passInput" placeholder="Sunucu Şifresi">
        <button onclick="window.login()">Sunucuya Bağlan</button>
    </div>
</div>

<div id="app-container">
    <div id="main-view">
        <div class="floating-tools">
            <button class="tool-btn" onclick="window.undo()"><i class="ph ph-arrow-u-up-left"></i></button>
            <button class="tool-btn" onclick="window.redo()"><i class="ph ph-arrow-u-up-right"></i></button>
            <button class="tool-btn" onclick="window.changeZoom(0.1)"><i class="ph ph-magnifying-glass-plus"></i></button>
            <button class="tool-btn" id="zoom-val" onclick="window.resetZoom()">100%</button>
            <button class="tool-btn" onclick="window.changeZoom(-0.1)"><i class="ph ph-magnifying-glass-minus"></i></button>
        </div>

        <div id="zoom-container">
            <div id="svg-wrapper">
                <div id="canvas-inner"></div>
                <svg id="control-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;"></svg>
            </div>
        </div>
    </div>
    
    <div id="sidebar">
        <div class="sidebar-scroll-area">
            <div style="display:flex; gap:5px; margin-bottom: 10px;">
                <button onclick="window.saveData()" class="action-btn active" style="flex:2;"><i class="ph ph-floppy-disk"></i> KAYDET</button>
                <button onclick="window.saveAllSettingsToCloud()" class="action-btn" style="background:#3b82f6;"><i class="ph ph-cloud-arrow-up"></i> AYARLARI YAYINLA</button>
            </div>
            
            <select id="file-selector" onchange="window.loadSlide(); window.updateSettingsUI();">
                <option value="slayt.svg">Ana Slayt (slayt.svg)</option>
                <option value="kampanya.svg">Kampanya (kampanya.svg)</option>
                <option value="m38u.svg">Sol Köşe Ekranı</option>
                <option value="sag_resim.svg">Sağ Köşe Ekranı</option>
            </select>

            <details style="margin-bottom: 10px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#3b82f6; cursor:pointer; margin-bottom:5px;">
                    <i class="ph ph-television"></i> MİNİ EKRAN VE YAYIN AYARLARI
                </summary>
                <div class="group-box" style="border-color:#3b82f6;">
                    <span class="label-text">SOL EKRAN (CANLI YAYIN URL)</span>
                    <input type="text" id="m3u8-url" placeholder="m3u8 linki yapıştırın" onchange="window.updateMiniData('left')">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <button id="btn-m3u8-v" onclick="window.toggleMini('left')" class="action-btn">GÖSTER/GİZLE</button>
                        <input type="number" id="m3u8-w" placeholder="W%" style="width:70px; margin:0;" onchange="window.updateMiniData('left')">
                        <input type="number" id="m3u8-h" placeholder="H%" style="width:70px; margin:0;" onchange="window.updateMiniData('left')">
                    </div>
                    
                    <span class="label-text">SAĞ EKRAN (RESİM LİSTESİ)</span>
                    <textarea id="right-imgs" placeholder="resim1.jpg, resim2.jpg" style="height:60px;" onchange="window.updateMiniData('right')"></textarea>
                    <div style="display:flex; gap:5px;">
                        <button id="btn-right-v" onclick="window.toggleMini('right')" class="action-btn">GÖSTER/GİZLE</button>
                        <input type="number" id="right-w" placeholder="W%" style="width:70px; margin:0;" onchange="window.updateMiniData('right')">
                        <input type="number" id="right-h" placeholder="H%" style="width:70px; margin:0;" onchange="window.updateMiniData('right')">
                    </div>
                </div>
            </details>

            <details style="margin-bottom: 10px;">
                <summary style="font-size:11px; font-weight:bold; color:#f59e0b; cursor:pointer;">
                    <i class="ph ph-clock"></i> SLAYT GEÇİŞ SÜRELERİ
                </summary>
                <div class="group-box">
                    <span class="label-text">GÖRÜNME SÜRESİ (MS)</span>
                    <input type="number" id="slide-dur" value="7000">
                    <span class="label-text">EFEKT</span>
                    <select id="slide-eff">
                        <option value="cube">3D Cube</option>
                        <option value="fade">Fade</option>
                        <option value="zoom">Zoom</option>
                    </select>
                </div>
            </details>

            <details style="margin-bottom: 10px;" open>
                <summary style="font-size:11px; font-weight:bold; color:#8b5cf6; cursor:pointer;">
                    <i class="ph ph-plus-circle"></i> NESNE EKLE
                </summary>
                <div class="group-box">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                        <button onclick="window.addNewText()" class="action-btn"><i class="ph ph-text-t"></i> METİN</button>
                        <button onclick="document.getElementById('img-in').click()" class="action-btn"><i class="ph ph-image"></i> RESİM</button>
                        <button onclick="window.addShape('rect')" class="action-btn"><i class="ph ph-square"></i> KARE</button>
                        <button onclick="window.toggleDrawMode()" class="action-btn"><i class="ph ph-pencil"></i> ÇİZİM</button>
                    </div>
                </div>
            </details>

            <details open>
                <summary style="font-size:11px; font-weight:bold; color:#06b6d4; cursor:pointer;">
                    <i class="ph ph-layers"></i> KATMANLAR
                </summary>
                <div id="layers-list"></div>
            </details>
        </div>

        <div id="editor-fields"></div>
        <input type="file" id="img-in" hidden onchange="window.handleFile(this)">
    </div>
</div>

<script>
    // --- ÇEKİRDEK DEĞİŞKENLER ---
    const WORKER_URL = "https://tvinfoeditor.tafbilgiislem.workers.dev";
    let SESSION_PASS = "", SHA_KEY = "", settingsSha = "", settingsData = {};
    let selectedEl = null, currentZoom = 1, history = [], hIndex = -1;

    // --- BAŞLATMA ---
    window.login = async () => {
        SESSION_PASS = document.getElementById('passInput').value;
        await window.loadSettings();
        await window.loadSlide();
    };

    window.loadSettings = async () => {
        try {
            const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json"} });
            const data = await res.json();
            settingsData = JSON.parse(atob(data.content));
            settingsSha = data.sha;
            window.updateSettingsUI();
        } catch(e) { window.showToast("Settings.json yüklenemedi", "error"); }
    };

    window.updateSettingsUI = () => {
        const file = document.getElementById('file-selector').value;
        const config = (settingsData.slides || []).find(s => s.file === file);
        if(config) {
            document.getElementById('slide-dur').value = config.duration;
            document.getElementById('slide-eff').value = config.effect;
        }
        const ms = settingsData.mini_screens;
        if(ms) {
            document.getElementById('m3u8-url').value = ms.left.url;
            document.getElementById('m3u8-w').value = ms.left.w;
            document.getElementById('m3u8-h').value = ms.left.h;
            document.getElementById('btn-m3u8-v').style.background = ms.left.visible ? "#10b981" : "#475569";
            
            document.getElementById('right-imgs').value = ms.right.images.join(', ');
            document.getElementById('right-w').value = ms.right.w;
            document.getElementById('right-h').value = ms.right.h;
            document.getElementById('btn-right-v').style.background = ms.right.visible ? "#10b981" : "#475569";
        }
    };

    window.toggleMini = (side) => {
        settingsData.mini_screens[side].visible = !settingsData.mini_screens[side].visible;
        window.updateSettingsUI();
    };

    window.updateMiniData = (side) => {
        const ms = settingsData.mini_screens[side];
        if(side === 'left') {
            ms.url = document.getElementById('m3u8-url').value;
            ms.w = parseInt(document.getElementById('m3u8-w').value);
            ms.h = parseInt(document.getElementById('m3u8-h').value);
        } else {
            ms.images = document.getElementById('right-imgs').value.split(',').map(s => s.trim());
            ms.w = parseInt(document.getElementById('right-w').value);
            ms.h = parseInt(document.getElementById('right-h').value);
        }
    };

    window.saveAllSettingsToCloud = async () => {
        const file = document.getElementById('file-selector').value;
        let slide = settingsData.slides.find(s => s.file === file);
        if(slide) {
            slide.duration = parseInt(document.getElementById('slide-dur').value);
            slide.effect = document.getElementById('slide-eff').value;
        }
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(settingsData, null, 2))));
        const res = await fetch(WORKER_URL, {
            method: "PUT",
            headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": "settings.json" },
            body: JSON.stringify({content: b64, sha: settingsSha})
        });
        if(res.ok) {
            const d = await res.json(); settingsSha = d.content.sha;
            window.showToast("Tüm ayarlar (JSON) güncellendi!");
        }
    };

    // --- ESKİ SVG DÜZENLEME MANTIKLARI (Kavis, Stil, Katman) ---
    window.loadSlide = async () => {
        const file = document.getElementById('file-selector').value;
        const res = await fetch(WORKER_URL, { headers: {"X-Auth-Key": SESSION_PASS, "X-File-Name": file} });
        const data = await res.json();
        SHA_KEY = data.sha;
        document.getElementById('canvas-inner').innerHTML = decodeURIComponent(escape(atob(data.content)));
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('app-container').style.display = "flex";
        window.initEditorCore();
    };

    window.initEditorCore = () => {
        const svg = document.querySelector('#canvas-inner svg');
        svg.querySelectorAll('*').forEach(el => {
            if(!el.id && el.tagName !== 'defs') el.id = "id_" + Math.random().toString(36).substr(2, 9);
            el.classList.add('duzenlenebilir');
        });
        window.renderLayers();
        window.saveState();
        
        // Sürükleme ve Tıklama
        svg.onmousedown = (e) => {
            const el = e.target.closest('.duzenlenebilir');
            if(el) { 
                selectedEl = el; 
                window.renderProperties(); 
                window.updateControlUI(); 
                window.renderLayers();
            }
        };
    };

    window.updateControlUI = () => {
        const ctrl = document.getElementById('control-layer');
        ctrl.innerHTML = "";
        if(!selectedEl) return;
        const b = selectedEl.getBBox();
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", b.x); rect.setAttribute("y", b.y);
        rect.setAttribute("width", b.width); rect.setAttribute("height", b.height);
        rect.setAttribute("fill", "none"); rect.setAttribute("stroke", "var(--accent)");
        rect.setAttribute("stroke-dasharray", "4,2");
        ctrl.appendChild(rect);
    };

    window.renderLayers = () => {
        const list = document.getElementById('layers-list'); list.innerHTML = "";
        const els = Array.from(document.querySelectorAll('.duzenlenebilir')).reverse();
        els.forEach(el => {
            const div = document.createElement('div');
            div.className = `layer-item ${selectedEl === el ? 'active' : ''}`;
            div.innerHTML = `<span>${el.tagName} (#${el.id.substr(0,4)})</span><i class="ph ph-trash" onclick="document.getElementById('${el.id}').remove(); window.renderLayers();"></i>`;
            div.onclick = () => { selectedEl = el; window.updateControlUI(); window.renderProperties(); window.renderLayers(); };
            list.appendChild(div);
        });
    };

    window.renderProperties = () => {
        const f = document.getElementById('editor-fields');
        if(!selectedEl) { f.innerHTML = ""; return; }
        const tag = selectedEl.tagName;
        let h = `<div class="group-box"><span class="label-text">${tag} ÖZELLİKLERİ</span>`;
        if(tag === 'text') {
            h += `<input type="text" value="${selectedEl.textContent}" oninput="selectedEl.textContent=this.value; window.updateControlUI();">`;
            h += `<span class="label-text">PUNTO</span><input type="number" value="${selectedEl.getAttribute('font-size') || 40}" oninput="selectedEl.setAttribute('font-size', this.value); window.updateControlUI();">`;
        }
        h += `<span class="label-text">RENK</span><input type="color" value="${selectedEl.getAttribute('fill') || '#ffffff'}" oninput="selectedEl.setAttribute('fill', this.value);">`;
        h += `<button class="action-btn danger" onclick="selectedEl.remove(); selectedEl=null; window.renderLayers(); window.renderProperties(); window.updateControlUI();">SİL</button></div>`;
        f.innerHTML = h;
    };

    window.saveData = async () => {
        document.getElementById('control-layer').innerHTML = "";
        const svg = document.querySelector('#canvas-inner svg');
        const txt = new XMLSerializer().serializeToString(svg);
        const b64 = btoa(unescape(encodeURIComponent(txt)));
        const res = await fetch(WORKER_URL, {
            method: "PUT",
            headers: { "X-Auth-Key": SESSION_PASS, "X-File-Name": document.getElementById('file-selector').value },
            body: JSON.stringify({content: b64, sha: SHA_KEY})
        });
        if(res.ok) { window.showToast("SVG Kaydedildi"); const d = await res.json(); SHA_KEY = d.content.sha; }
    };

    window.saveState = () => {
        const svg = document.querySelector('#canvas-inner svg');
        history = history.slice(0, hIndex + 1);
        history.push(svg.innerHTML);
        hIndex++;
    };

    window.undo = () => { if(hIndex > 0) { hIndex--; document.querySelector('#canvas-inner svg').innerHTML = history[hIndex]; window.initEditorCore(); } };
    window.showToast = (m, t='success') => {
        const c = document.getElementById('toast-container');
        const d = document.createElement('div'); d.className = 'toast'; d.innerText = m;
        c.appendChild(d); setTimeout(() => d.remove(), 3000);
    };

    window.changeZoom = (v) => { currentZoom += v; document.getElementById('svg-wrapper').style.transform = `scale(${currentZoom})`; document.getElementById('zoom-val').innerText = Math.round(currentZoom*100) + "%"; };
    window.resetZoom = () => { currentZoom = 1; window.changeZoom(0); };

</script>
</body>
</html>
